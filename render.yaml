services:
  # 1. Backend (FastAPI)
  - type: web
    name: strat-edge-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: GCP_PROJECT_ID
        value: custom-mix-428318-h3
      - key: GCP_BUCKET_NAME
        value: stratedgestore
      - key: GOOGLE_APPLICATION_CREDENTIALS
        value: /etc/secrets/gcp-credentials.json

  # 2. Frontend (React) - Correct Blueprint Format for Static Site
  - type: web
    name: strat-edge-portal
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: strat-edge-api
          property: host
